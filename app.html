<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Growth Plan | Rate Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="brand.css">
<link rel="stylesheet" href="report.css">
<script src="analytics.js"></script>
<style>
/* ---- app shell / top bar ---- */
.appbar{background:var(--rt-ink);color:#fff;padding:var(--space-4) 0;position:sticky;top:0;z-index:50}
.appbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.appbar .logo img{height:34px;display:block;background:#fff;padding:5px 9px;border-radius:9px}
.appbar .brandgroup{display:flex;align-items:center;gap:var(--space-3)}
.appbar .brandtag{display:flex;flex-direction:column;line-height:1.15;padding-left:var(--space-3);border-left:1px solid rgba(255,255,255,.18)}
.appbar .brandtag .bt-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:.95rem;color:#fff}
.appbar .brandtag .bt-sub{font-family:'Open Sans',sans-serif;font-weight:600;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:.15rem}
@media(max-width:560px){.appbar .brandtag{display:none}}
.appbar .right{display:flex;align-items:center;gap:var(--space-3)}
.appbar .who{font-size:.82rem;color:rgba(255,255,255,.6);max-width:42vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.linkbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border-radius:999px;cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif}
.linkbtn:hover{background:rgba(69,183,46,.22);border-color:var(--rt-green)}

/* ---- wizard ---- */
.wiz{max-width:760px;margin:0 auto;padding:var(--space-10) var(--space-5) var(--space-16)}
.wiz-progress{display:flex;gap:.4rem;margin-bottom:var(--space-8)}
.wiz-progress .seg{height:5px;flex:1;border-radius:999px;background:var(--border);transition:background .3s}
.wiz-progress .seg.done{background:var(--rt-green)}
.wiz-step{display:none;animation:fade .35s ease}
.wiz-step.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.wiz .stepnum{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--rt-green-deep)}
.wiz h2{font-size:1.7rem;font-weight:800;margin:.4rem 0 .5rem}
.wiz .help{color:var(--text-muted);margin-bottom:var(--space-8);font-size:1rem}
.field{margin-bottom:var(--space-6)}
.field label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
.field .hint{font-size:.82rem;color:var(--text-faint);font-weight:400;margin-top:.2rem}
.field input[type=text],.field input[type=email],.field input[type=number],.field textarea{
  width:100%;padding:.85rem 1rem;font-size:1rem;font-family:'Open Sans',sans-serif;border:1.5px solid var(--border);
  border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--rt-green)}
.field .money-input{position:relative}
.field .money-input span{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-faint);font-weight:600}
.field .money-input input{padding-left:1.9rem}
.two{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
@media(max-width:560px){.two{grid-template-columns:1fr}}
textarea{min-height:90px;resize:vertical;line-height:1.6}

/* channel chips */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
@media(max-width:560px){.chips{grid-template-columns:1fr}}
.chip{display:flex;align-items:center;gap:.7rem;padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface);transition:all .15s;font-size:.95rem;font-weight:600}
.chip:hover{border-color:var(--rt-green)}
.chip input{accent-color:var(--rt-green);width:18px;height:18px}
.chip.sel{border-color:var(--rt-green);background:rgba(69,183,46,.08)}

/* live preview card inside wizard */
.live{background:linear-gradient(160deg,var(--rt-ink),#1c2620);color:#fff;border-radius:var(--radius-lg);padding:var(--space-8);margin-top:var(--space-8);position:relative;overflow:hidden}
.live::after{content:"";position:absolute;right:-80px;bottom:-100px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(69,183,46,.2),transparent 65%)}
.live .eyebrow{color:var(--rt-green)}
.live h3{color:#fff;font-size:1.2rem;margin:.3rem 0 var(--space-5);font-family:'Poppins'}
.live-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);position:relative;z-index:2}
@media(max-width:560px){.live-stats{grid-template-columns:repeat(2,1fr)}}
.live-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:var(--space-4);text-align:center}
.live-stat .v{font-family:'Poppins';font-weight:800;font-size:1.4rem;color:var(--rt-green)}
.live-stat .k{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:.3rem;line-height:1.3}

.wiz-nav{display:flex;justify-content:space-between;gap:var(--space-4);margin-top:var(--space-10)}
.wiz-err{color:#c0392b;font-size:.88rem;margin-top:var(--space-4);min-height:1.2em}
.hidden{display:none !important}

/* generating overlay */
.gen-overlay{position:fixed;inset:0;background:var(--rt-ink);display:grid;place-items:center;z-index:200;color:#fff;text-align:center}
.gen-overlay .spin{width:46px;height:46px;border-width:4px;border-color:rgba(69,183,46,.25);border-top-color:var(--rt-green);margin-bottom:var(--space-6)}
.gen-overlay h2{color:#fff;font-size:1.5rem;margin-bottom:.5rem}
.gen-overlay p{color:rgba(255,255,255,.6)}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="center-screen">
  <span class="spin" style="width:40px;height:40px;border-width:4px;border-color:rgba(69,183,46,.25);border-top-color:var(--rt-green)"></span>
</div>

<!-- Generating overlay -->
<div id="genOverlay" class="gen-overlay hidden">
  <div>
    <span class="spin"></span>
    <h2>Building your plan...</h2>
    <p>Crunching your goals into the exact weekly activity it takes.</p>
  </div>
</div>

<!-- App content gets injected here -->
<div id="appRoot" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="referral.js"></script>
<script src="engine.js"></script>
<script src="wizard.js"></script>
<script src="report.js"></script>
<script src="app.js"></script>
</body>
</html>
