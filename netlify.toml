# Rate Tracker - Residual Growth Plan (residualgrowthplan.com)
# Static multi-page app. Real .html files exist, so no SPA rewrite needed.

[build]
  publish = "."

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Pretty URL: /login -> login.html, /app -> app.html, /admin -> admin.html
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
