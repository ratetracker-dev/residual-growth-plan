<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Rate Tracker Growth Plans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<style>
.appbar{background:var(--rt-ink);color:#fff;padding:var(--space-4) 0;position:sticky;top:0;z-index:50}
.appbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);max-width:1180px}
.appbar .logo img{height:38px;padding:5px 10px;border-radius:10px}
.appbar .right{display:flex;align-items:center;gap:var(--space-3)}
.linkbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border-radius:999px;cursor:pointer;text-decoration:none;font-family:'Poppins',sans-serif}
.linkbtn:hover{background:rgba(69,183,46,.22);border-color:var(--rt-green)}
.adminwrap{max-width:1180px;margin:0 auto;padding:var(--space-10) var(--space-5) var(--space-16)}
.adminwrap h1{font-size:1.8rem;font-weight:800;margin-bottom:.3rem}
.adminwrap .sub{color:var(--text-muted);margin-bottom:var(--space-8)}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-8)}
@media(max-width:760px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:var(--space-5);box-shadow:var(--shadow)}
.stat .n{font-family:'Poppins';font-weight:800;font-size:1.9rem;color:var(--rt-green-deep);line-height:1}
.stat .l{font-size:.78rem;color:var(--text-muted);margin-top:.4rem}
.tierbar{display:flex;gap:var(--space-3);margin-bottom:var(--space-8);flex-wrap:wrap}
.tierchip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:.5rem 1rem;font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.tierchip .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.tierchip b{font-family:'Poppins';color:var(--rt-green-deep)}
.toolbar{display:flex;gap:var(--space-3);margin-bottom:var(--space-5);flex-wrap:wrap;align-items:center}
.linkbtn.dark{background:var(--rt-ink);color:#fff;border:1px solid var(--rt-ink);white-space:nowrap}
.linkbtn.dark:hover{background:var(--rt-green-deep);border-color:var(--rt-green-deep)}
table.partners th.sortable{cursor:pointer;user-select:none}
table.partners th.sortable:hover{color:var(--rt-green-deep)}
table.partners th .arrow{font-size:.66rem;opacity:.55;margin-left:.25rem}
.copybtn{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:.3rem .65rem;font-size:.74rem;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;color:var(--text-muted)}
.copybtn:hover{border-color:var(--rt-green);color:var(--rt-green-deep)}
.toolbar input{flex:1;min-width:220px;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'Open Sans';outline:none}
.toolbar input:focus{border-color:var(--rt-green)}
.tablecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
table.partners{width:100%;border-collapse:collapse}
table.partners th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);padding:var(--space-4);border-bottom:2px solid var(--border);background:var(--surface-2)}
table.partners td{padding:var(--space-4);border-bottom:1px solid var(--border);font-size:.92rem}
table.partners tr:last-child td{border-bottom:none}
table.partners tr.row{cursor:pointer;transition:background .12s}
table.partners tr.row:hover{background:var(--surface-2)}
.tier-pill{display:inline-block;font-size:.72rem;font-weight:700;padding:.25rem .6rem;border-radius:999px;background:rgba(69,183,46,.12);color:var(--rt-green-deep);font-family:'Poppins'}
.muted{color:var(--text-muted)}
.empty{padding:var(--space-16);text-align:center;color:var(--text-faint)}
.hidden{display:none}
/* detail drawer */
.drawer-back{position:fixed;inset:0;background:rgba(10,15,10,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-back.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,100vw);background:var(--bg);z-index:100;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);overflow-y:auto}
.drawer.open{transform:none}
.drawer-head{background:var(--rt-ink);color:#fff;padding:var(--space-6) var(--space-6) var(--space-8)}
.drawer-head .x{float:right;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem}
.drawer-head h2{font-size:1.4rem;margin:.5rem 0 .2rem;color:#fff}
.drawer-head .em{color:rgba(255,255,255,.6);font-size:.9rem}
.drawer-body{padding:var(--space-6)}
.d-section{margin-bottom:var(--space-8)}
.d-section h3{font-size:.74rem;text-transform:uppercase;letter-spacing:.1em;color:var(--rt-green-deep);font-weight:700;margin-bottom:var(--space-4)}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.d-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:var(--space-4)}
.d-cell .k{font-size:.72rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em}
.d-cell .v{font-family:'Poppins';font-weight:700;font-size:1.1rem;margin-top:.2rem}
.d-list{display:flex;flex-wrap:wrap;gap:.5rem}
.d-tag{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:.35rem .75rem;font-size:.82rem;font-weight:600}
.d-text{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rt-green);border-radius:var(--radius);padding:var(--space-4);font-size:.92rem;color:var(--text-muted);white-space:pre-wrap}
</style>
<script src="analytics.js"></script>
</head>
<body>
<div id="loadingScreen" class="center-screen">
  <span class="spin" style="width:40px;height:40px;border-width:4px;border-color:rgba(69,183,46,.25);border-top-color:var(--rt-green)"></span>
</div>

<div id="denied" class="center-screen hidden">
  <div style="text-align:center;max-width:380px">
    <div class="logo" style="display:inline-flex;margin-bottom:1.5rem"><img src="assets/rate-tracker-logo.jpg" alt="Rate Tracker"></div>
    <h1 style="font-size:1.4rem;margin-bottom:.5rem">Admins only</h1>
    <p class="muted" style="margin-bottom:1.5rem">This dashboard is restricted to Rate Tracker administrators.</p>
    <a class="btn" href="app.html">Back to my plan</a>
  </div>
</div>

<div id="adminRoot" class="hidden">
  <div class="appbar"><div class="wrap">
    <div class="logo"><img src="assets/rate-tracker-logo.jpg" alt="Rate Tracker"></div>
    <div class="right"><a class="linkbtn" href="app.html">My plan</a><button class="linkbtn" id="signout">Sign out</button></div>
  </div></div>
  <div class="adminwrap">
    <h1>Partner Growth Plans</h1>
    <p class="sub">Every plan your partners have generated, with their answers and computed targets.</p>
    <div class="stat-row" id="stats"></div>
    <div class="tierbar" id="tierbar"></div>
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by name or email...">
      <button class="linkbtn dark" id="exportCsv">Export CSV</button>
    </div>
    <div class="tablecard"><div id="tableArea"></div></div>
  </div>
</div>

<div class="drawer-back" id="drawerBack"></div>
<div class="drawer" id="drawer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="engine.js"></script>
<script src="admin.js"></script>
</body>
</html>
